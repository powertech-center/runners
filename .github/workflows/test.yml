name: "Test Runners"

on:
  push:
    branches:
      - develop
  workflow_dispatch:

jobs:
  # ── Linux ───────────────────────────────────────────────────────────
  linux-x64-gnu:
    name: "Test (linux-x64-gnu)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: linux-x64-gnu
          checkout: true
          shell: pwsh
          command: ./test.ps1

  linux-x64-musl:
    name: "Test (linux-x64-musl)"
    runs-on: ubuntu-24.04
    container: ghcr.io/powertech-center/runners/musl-x64:latest
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: linux-x64-musl
          checkout: true
          shell: pwsh
          command: ./test.ps1

  linux-arm64-gnu:
    name: "Test (linux-arm64-gnu)"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: linux-arm64-gnu
          checkout: true
          shell: pwsh
          command: ./test.ps1

  linux-arm64-musl:
    name: "Test (linux-arm64-musl)"
    runs-on: ubuntu-24.04-arm
    container: ghcr.io/powertech-center/runners/musl-arm64:latest
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: linux-arm64-musl
          checkout: true
          shell: pwsh
          command: ./test.ps1

  # ── macOS ───────────────────────────────────────────────────────────
  macos-x64:
    name: "Test (macos-x64)"
    runs-on: macos-26-intel
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: macos-x64
          checkout: true
          shell: pwsh
          command: ./test.ps1

  macos-arm64:
    name: "Test (macos-arm64)"
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: macos-arm64
          checkout: true
          shell: pwsh
          command: ./test.ps1

  # ── Windows ─────────────────────────────────────────────────────────
  windows-x64:
    name: "Test (windows-x64)"
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: windows-x64
          checkout: true
          shell: pwsh
          command: ./test.ps1

  windows-arm64:
    name: "Test (windows-arm64)"
    runs-on: windows-11-arm
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: windows-arm64
          checkout: true
          shell: pwsh
          command: ./test.ps1
