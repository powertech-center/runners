  # ── Windows ─────────────────────────────────────────────────────────
  windows-x64:
    name: "Test (windows-x64)"
    runs-on: windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./run
        with:
          platform: windows-x64
          shell: pwsh
          checkout: false
          tools: "gcc clang cmake meson python go rust dotnet node java gradle flutter crossler"
          command: |
            $failed = 0

            Write-Host "=== Pre-installed utilities ==="
            foreach ($cmd in @("bash", "git", "curl", "wget", "zip", "unzip", "tar", "make", "ninja", "pkg-config")) {
              if (Get-Command $cmd -ErrorAction SilentlyContinue) {
                Write-Host "OK: $cmd"
              } else {
                Write-Host "FAIL: $cmd not found"
                $failed = 1
              }
            }

            # gzip is typically available via Git for Windows
            if ((Get-Command gzip -ErrorAction SilentlyContinue) -or (Get-Command "C:\Program Files\Git\usr\bin\gzip.exe" -ErrorAction SilentlyContinue)) {
              Write-Host "OK: gzip"
            } else {
              Write-Host "FAIL: gzip not found"
              $failed = 1
            }

            Write-Host ""
            Write-Host "=== Tools ==="
            foreach ($cmd in @("gcc", "clang", "cmake", "meson", "go", "rustc", "dotnet", "node", "java", "gradle", "flutter", "crossler")) {
              if (Get-Command $cmd -ErrorAction SilentlyContinue) {
                Write-Host "OK: $cmd"
              } else {
                Write-Host "FAIL: $cmd not found"
                $failed = 1
              }
            }

            if (Get-Command python3 -ErrorAction SilentlyContinue) {
              Write-Host "OK: python3"
            } elseif (Get-Command python -ErrorAction SilentlyContinue) {
              Write-Host "OK: python"
            } else {
              Write-Host "FAIL: python not found"
              $failed = 1
            }

            # pwsh is pre-installed on Windows
            if (Get-Command pwsh -ErrorAction SilentlyContinue) {
              Write-Host "OK: pwsh (pre-installed)"
            } else {
              Write-Host "FAIL: pwsh not found"
              $failed = 1
            }

            if ($failed -ne 0) {
              Write-Host ""
              Write-Host "Some checks failed!"
              exit 1
            }

            Write-Host ""
            Write-Host "All checks passed."

