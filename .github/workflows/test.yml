name: "Test Runners"

on:
  workflow_dispatch:

jobs:
  # ── Linux ───────────────────────────────────────────────────────────
  linux-x64-gnu:
    name: "Test (linux-x64-gnu)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: ./run
        with:
          platform: linux-x64-gnu
          shell: bash
          checkout: false
          tools: "gcc clang cmake meson python go rust dotnet node java gradle flutter crossler pwsh"
          command: |
            failed=0

            echo "=== Pre-installed utilities ==="
            for cmd in bash git curl wget zip unzip tar gzip make ninja pkg-config; do
              if command -v "$cmd" > /dev/null 2>&1; then
                echo "OK: $cmd"
              else
                echo "FAIL: $cmd not found"
                failed=1
              fi
            done

            echo ""
            echo "=== Tools ==="
            for cmd in gcc clang cmake meson go rustc dotnet node java gradle flutter crossler pwsh; do
              if command -v "$cmd" > /dev/null 2>&1; then
                echo "OK: $cmd"
              else
                echo "FAIL: $cmd not found"
                failed=1
              fi
            done

            if command -v python3 > /dev/null 2>&1; then
              echo "OK: python3"
            elif command -v python > /dev/null 2>&1; then
              echo "OK: python"
            else
              echo "FAIL: python not found"
              failed=1
            fi

            if [ "$failed" -ne 0 ]; then
              echo ""
              echo "Some checks failed!"
              exit 1
            fi

            echo ""
            echo "All checks passed."

  linux-x64-musl:
    name: "Test (linux-x64-musl)"
    runs-on: ubuntu-24.04
