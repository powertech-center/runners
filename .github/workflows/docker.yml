name: "Update musl images"

on:
  push:
    branches: [main]
    paths: [musl/Dockerfile]
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 0" # weekly, Sunday 22:00 MSK (19:00 UTC)

permissions:
  packages: write

jobs:
  build:
    name: "Build (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: musl
          file: musl/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/powertech-center/runners/musl-${{ matrix.arch }}:latest
          load: true

      - name: Image size
        shell: bash
        run: docker images ghcr.io/powertech-center/runners/musl-${{ matrix.arch }}:latest --format "{{.Size}}"
