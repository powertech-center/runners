name: "Build musl images"

on:
  push:
    branches: [main]
    paths: [musl/Dockerfile]
  workflow_dispatch:
  schedule:
    - cron: "0 19 * * 0" # weekly, Sunday 22:00 MSK (19:00 UTC)

permissions:
  packages: write

jobs:
  build:
    name: "Build (${{ matrix.arch }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: musl
          file: musl/Dockerfile
          platforms: linux/${{ matrix.arch }}
          push: false
          outputs: type=image,name=ghcr.io/powertech-center/runners/musl,push-by-digest=true,name-canonical=true
        id: build

      - name: Export digest
        shell: bash
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.arch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          retention-days: 1

  manifest:
    name: "Push manifest"
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push manifest
        shell: bash
        run: |
          AMD64_DIGEST=$(cat /tmp/digests/amd64)
          ARM64_DIGEST=$(cat /tmp/digests/arm64)

          docker buildx imagetools create \
            --tag ghcr.io/powertech-center/runners/musl:latest \
            "ghcr.io/powertech-center/runners/musl@${AMD64_DIGEST}" \
            "ghcr.io/powertech-center/runners/musl@${ARM64_DIGEST}"
