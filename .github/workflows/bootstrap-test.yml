  macos-x64:
    name: "Test (macos-x64)"
    runs-on: macos-26-intel
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: macos-x64
          checkout: true
          command: python3 bootstrap-test.py

  macos-arm64:
    name: "Test (macos-arm64)"
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: macos-arm64
          checkout: true
          command: python3 bootstrap-test.py
