name: "Bootstrap: Test"

# Consumer-side validation of published GHCR bundles. Each job uses
# powertech-center/runners/run@<ref>, whose action.yml performs the
# actual bootstrap (download patch.tar.gz from GHCR + tar -xzf -C /).
# After bootstrap the job runs bootstrap-test.py against the freshly
# prepared runner to verify the published bundle still works from a
# cold start, not just under the in-place emulation of the build job.
#
# NOTE: we reference the action at feature/debug so that this workflow
# exercises the current in-development run/action.yml alongside the
# latest published bundle. Flip back to @develop / @main once the
# bootstrap work lands on the mainline.

on:
  push:
  workflow_dispatch:
  schedule:
    # Weekly smoke-test of the latest published bundles against a cold
    # runner. Mondays 06:00 UTC — off-peak for both EU and US.
    - cron: "0 6 * * 1"

jobs:
  # -- Linux gnu -----------------------------------------------------------
  linux-x64-gnu:
    name: "Test (linux-x64-gnu)"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: linux-x64-gnu
          checkout: true
          command: python3 bootstrap-test.py

  linux-arm64-gnu:
    name: "Test (linux-arm64-gnu)"
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: powertech-center/runners/run@develop
        with:
          platform: linux-arm64-gnu
          checkout: true
          command: python3 bootstrap-test.py

  # -- Disabled until bootstrap-build-publish.yml publishes these platforms
  #    again. Re-enable in lockstep with the matrix in
