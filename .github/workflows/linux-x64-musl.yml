name: "linux-x64-musl"

on:
  workflow_call:
    inputs:
      name:
        description: "Job display name"
        required: false
        type: string
        default: "linux-x64-musl"
      checkout:
        description: "Checkout the calling repository"
        required: false
        type: boolean
        default: true
      checkout-submodules:
        description: "Checkout submodules recursively"
        required: false
        type: boolean
        default: false
      checkout-lfs:
        description: "Fetch LFS objects"
        required: false
        type: boolean
        default: false
      shell:
        description: "Shell to execute the command in (bash, sh, pwsh, cmd)"
        required: false
        type: string
        default: "bash"
      command:
        description: "Command to execute"
        required: true
        type: string
      artifacts-dir:
        description: "Directory for artifacts"
        required: false
        type: string
        default: "artifacts"
      artifacts-download:
        description: "Space-separated list of artifact names to download"
        required: false
        type: string
        default: ""
      artifacts-upload:
        description: "Space-separated list of artifact names to upload"
        required: false
        type: string
        default: ""
      timeout:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  run:
    name: ${{ inputs.name }}
    runs-on: ubuntu-24.04
    container: ghcr.io/powertech-center/runners/musl-x64:latest
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - uses: powertech-center/runners/run@main
        with:
          platform: linux-x64-musl
          checkout: ${{ inputs.checkout }}
          checkout-submodules: ${{ inputs.checkout-submodules }}
          checkout-lfs: ${{ inputs.checkout-lfs }}
          shell: ${{ inputs.shell }}
          command: ${{ inputs.command }}
          artifacts-dir: ${{ inputs.artifacts-dir }}
          artifacts-download: ${{ inputs.artifacts-download }}
          artifacts-upload: ${{ inputs.artifacts-upload }}
