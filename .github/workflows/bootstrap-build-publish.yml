name: "Bootstrap: Build & Publish"

# Build per-platform bootstrap ROOT directories via bootstrap-build.py,
# pack each into a single patch.tar.gz, and publish to GHCR as an OCI
# artifact at ghcr.io/powertech-center/runners/{platform}:latest.
#
# run/action.yml on consumer runners reads layers[0].digest from the
# OCI manifest and extracts the blob with `tar -xzf patch.tar.gz -C /`
# (or `C:\`). The published archive is therefore exactly one gzipped
# tar with paths from the filesystem root -- no manifest, no extra
# layers. See CLAUDE.md for the rationale.
#
# Gating: each job builds patch.tar.gz, then EMULATES the consumer-side
# bootstrap by extracting the freshly built archive into / (or C:\) on
# the build runner itself, then runs bootstrap-test.py against that
# in-place layout. Only if tests pass does the job push to GHCR. This
# guarantees we never publish a broken bundle.

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Build (${{ matrix.platform }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64-musl
            runner: ubuntu-24.04
          - platform: linux-arm64-musl
            runner: ubuntu-24.04-arm
          - platform: windows-x64
            runner: windows-latest
          - platform: windows-arm64
            runner: windows-11-arm
          - platform: macos-x64
            runner: macos-26-intel
          - platform: macos-arm64
            runner: macos-26
          - platform: linux-x64-gnu
            runner: ubuntu-24.04
          - platform: linux-arm64-gnu
            runner: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      # Linux musl: apk binary comes from the Alpine minirootfs that
      # bootstrap-build.py extracts into ROOT itself; no host apk needed.
      # (apk-tools is not available in ubuntu-24.04 noble universe anyway.)

      - name: Build bootstrap ROOT
        shell: bash
        run: |
          python3 bootstrap-build.py "${{ matrix.platform }}" --pack

      # -- Gating: emulate consumer-side bootstrap by extracting our just
      # built patch.tar.gz at the filesystem root of the build runner.
      # This is exactly what run/action.yml does on consumers, only here
      # we run it in-place against the freshly built archive (not from
      # GHCR) so that the next step can validate it.
      - name: Emulate bootstrap (Unix)
        if: "!startsWith(matrix.platform, 'windows')"
        shell: bash
        env:
          PLATFORM: ${{ matrix.platform }}
        run: |
          set -e
          ARCHIVE="${RUNNER_TEMP}/patch.tar.gz"
          ls -la "$ARCHIVE"

          # Per-platform prepare: rename host files aside so the bundle
          # replaces them cleanly. Mirrors run/action.yml prepare logic
          # so the emulated path and the consumer path use the same
          # transformation. Non-fatal if a target is absent.
          case "$PLATFORM" in
            linux-x64-musl|linux-arm64-musl)
              ARCH="$(uname -m)"
              case "$ARCH" in
                x86_64)  MULTIARCH="x86_64-linux-gnu" ;;
                aarch64) MULTIARCH="aarch64-linux-gnu" ;;
              esac
              _rename() {
                SRC="$1"; PARENT="$(dirname "$SRC")"; BASE="$(basename "$SRC")"
                [ -e "$SRC" ] || [ -L "$SRC" ] || return 0
                sudo mv "$SRC" "$PARENT/_$BASE"
              }
              _rename "/etc/lsb-release"
              _rename "/usr/include/${MULTIARCH}"
              _rename "/usr/bin/clang"
              _rename "/usr/bin/clang++"
              _rename "/usr/bin/cc"
              _rename "/usr/bin/c++"
              _rename "/usr/bin/ld.lld"
              for pair in "clang clang-18" "clang++ clang++-18" "ld.lld ld.lld-18"; do
                set -- $pair
                UNV="$1"; VER="$2"
                if [ ! -e "/usr/bin/_$UNV" ] && [ -x "/usr/bin/$VER" ]; then
                  sudo ln -sf "/usr/bin/$VER" "/usr/bin/_$UNV"
                fi
              done
              REAL_DIR="/home/runner/.cargo/bin/_rustup-real"
              sudo mkdir -p "$REAL_DIR"
              for tool in rustc cargo rustup; do
                SRC="/home/runner/.cargo/bin/$tool"
                if [ -e "$SRC" ] && [ ! -e "$REAL_DIR/$tool" ]; then
                  sudo cp -a "$SRC" "$REAL_DIR/$tool"
                fi
              done
              ;;
          esac

          # Extract in place at /. Do NOT swallow stderr -- if this fails we
          # want the build to stop here, not later in the gating tests with
          # a confusing linker error. `tar -xz -C /` overwrites existing
          # files under paths we own (we ship absolute paths from /).
          if [ "$(uname -s)" = "Darwin" ]; then
            # macOS bsdtar: -m skips restoring mtime, -o skips restoring
            # ownership -- both fail on the read-only /usr/ volume (Intel).
            sudo tar -xmozf "$ARCHIVE" -C /
          else
            # GNU tar: --no-overwrite-dir avoids touching existing dir metadata.
            sudo tar --no-overwrite-dir -xzf "$ARCHIVE" -C /
          fi

      - name: Prepare (Windows arm64 — rename stock LLVM)
        if: matrix.platform == 'windows-arm64'
        shell: cmd
        run: |
          @echo off
          if exist "C:\Program Files\LLVM" (
            ren "C:\Program Files\LLVM" _LLVM
            echo Renamed LLVM to _LLVM
          )

      - name: Emulate bootstrap (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: cmd
        run: |
          @echo off
          setlocal EnableExtensions
          set "ARCHIVE=%RUNNER_TEMP%\patch.tar.gz"
          dir "%ARCHIVE%"
          tar -xzf "%ARCHIVE%" -C C:\ || exit /b 1

      # -- Gating: run bootstrap-test.py against the in-place layout we
      # just produced. RUNNER_PLATFORM is exported so the test script
      # picks the right platform group; bootstrap-test.py also computes
      # it from os/arch as a fallback.
      - name: Run bootstrap tests (gating)
        shell: bash
        env:
          RUNNER_PLATFORM: ${{ matrix.platform }}
        run: |
          python3 bootstrap-test.py

      - name: Install ORAS (Windows)
        if: startsWith(matrix.platform, 'windows')
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $orasVersion = "1.2.2"
          $url = "https://github.com/oras-project/oras/releases/download/v${orasVersion}/oras_${orasVersion}_windows_amd64.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "oras.zip"
          $orasDir = Join-Path $env:RUNNER_TEMP "oras"
          curl.exe -fL --retry 5 --retry-delay 2 --retry-connrefused -o $zipPath $url
          New-Item -ItemType Directory -Force -Path $orasDir | Out-Null
          Expand-Archive -LiteralPath $zipPath -DestinationPath $orasDir -Force
          echo $orasDir >> $env:GITHUB_PATH
          & (Join-Path $orasDir "oras.exe") version

      - name: Install ORAS (Unix)
        if: "!startsWith(matrix.platform, 'windows')"
        shell: bash
        run: |
          set -e
          ORAS_VERSION="1.2.2"
          case "$(uname -s)" in
            Linux)  os="linux" ;;
            Darwin) os="darwin" ;;
            *) echo "Unsupported OS"; exit 1 ;;
          esac
          case "$(uname -m)" in
            x86_64|amd64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *) echo "Unsupported arch"; exit 1 ;;
          esac
          URL="https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_${os}_${arch}.tar.gz"
          ORAS_DIR="${RUNNER_TEMP}/oras"
          mkdir -p "$ORAS_DIR"
          curl -fsSL "$URL" | tar -xz -C "$ORAS_DIR"
          echo "${ORAS_DIR}" >> "$GITHUB_PATH"
          "${ORAS_DIR}/oras" version

      - name: Publish OCI artifact
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          set -e
          PLATFORM="${{ matrix.platform }}"
          IMAGE="ghcr.io/powertech-center/runners/${PLATFORM}:latest"

          # bootstrap-build.py with --pack writes patch.tar.gz next to
          # the ROOT directory, i.e. $RUNNER_TEMP/patch.tar.gz.
          ARCHIVE="${RUNNER_TEMP}/patch.tar.gz"
          if [ ! -f "$ARCHIVE" ]; then
            echo "::error::archive not found at $ARCHIVE"
            exit 1
          fi

          ls -la "$ARCHIVE"

          oras login ghcr.io --username "$GH_ACTOR" --password "$GH_TOKEN"

          cd "$RUNNER_TEMP"
          oras push "$IMAGE" \
            --artifact-type "application/vnd.powertech.bootstrap.v1" \
            "patch.tar.gz:application/gzip"

          echo "Published: $IMAGE"
