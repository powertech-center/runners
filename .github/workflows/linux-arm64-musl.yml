name: "linux-arm64-musl"

on:
  workflow_call:
    inputs:
      name:
        description: "Job display name"
        required: false
        type: string
        default: "linux-arm64-musl"
      checkout:
        description: "Checkout the calling repository"
        required: false
        type: boolean
        default: true
      command:
        description: "Command to execute"
        required: true
        type: string
      artifacts-dir:
        description: "Directory for artifacts"
        required: false
        type: string
        default: "artifacts"
      artifacts-download:
        description: "Space-separated list of artifact names to download"
        required: false
        type: string
        default: ""
      artifacts-upload:
        description: "Space-separated list of artifact names to upload"
        required: false
        type: string
        default: ""
      timeout:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  run:
    name: ${{ inputs.name }}
    runs-on: ubuntu-24.04-arm
    container: ghcr.io/powertech-center/runners/musl:latest
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - uses: powertech-center/runners/musl@main
        with:
          platform: linux-arm64-musl
          command: ${{ inputs.command }}
          checkout: ${{ inputs.checkout }}
          artifacts-dir: ${{ inputs.artifacts-dir }}
          artifacts-download: ${{ inputs.artifacts-download }}
          artifacts-upload: ${{ inputs.artifacts-upload }}
