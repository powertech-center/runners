name: "macos-arm64"

on:
  workflow_call:
    inputs:
      name:
        description: "Job display name"
        required: false
        type: string
        default: "macos-arm64"
      checkout:
        description: "Checkout the calling repository"
        required: false
        type: boolean
        default: true
      shell:
        description: "Shell to use (bash or pwsh)"
        required: false
        type: string
        default: "bash"
      command:
        description: "Command to execute"
        required: true
        type: string
      artifacts-dir:
        description: "Directory for artifacts"
        required: false
        type: string
        default: "artifacts"
      artifacts-download:
        description: "Space-separated list of artifact names to download"
        required: false
        type: string
        default: ""
      artifacts-upload:
        description: "Space-separated list of artifact names to upload"
        required: false
        type: string
        default: ""
      timeout:
        description: "Job timeout in minutes"
        required: false
        type: number
        default: 30

jobs:
  run:
    name: ${{ inputs.name }}
    runs-on: macos-26
    timeout-minutes: ${{ inputs.timeout }}
    steps:
      - uses: powertech-center/runners/std@main
        with:
          platform: macos-arm64
          checkout: ${{ inputs.checkout }}
          shell: ${{ inputs.shell }}
          command: ${{ inputs.command }}
          artifacts-dir: ${{ inputs.artifacts-dir }}
          artifacts-download: ${{ inputs.artifacts-download }}
          artifacts-upload: ${{ inputs.artifacts-upload }}
