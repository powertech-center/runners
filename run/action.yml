name: "Run"
description: "Sets up the runner environment, downloads artifacts, and executes a command"

inputs:
  platform:
    description: "Target platform triplet (e.g., linux-x64-gnu)"
    required: true
  checkout:
    description: "Checkout the calling repository"
    required: false
    default: "true"
  checkout-submodules:
    description: "Checkout submodules recursively"
    required: false
    default: "false"
  checkout-lfs:
    description: "Fetch LFS objects"
    required: false
    default: "false"
  shell:
    description: "Shell to use (bash or pwsh)"
    required: false
    default: "bash"
  command:
    description: "Command to execute"
    required: false
    default: ""
  artifacts-dir:
    description: "Directory for artifacts"
    required: false
    default: "artifacts"
  artifacts-download:
    description: "Space-separated list of artifact names to download"
    required: false
    default: ""
  artifacts-upload:
    description: "Space-separated list of artifact names to upload"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # - name: Bootstrap
    #   if: inputs.platform == 'macos-x64' || inputs.platform == 'macos-arm64'
    #   shell: bash
    #   run: |
    #     brew install tree

    - name: Bootstrap
      if: inputs.platform == 'windows-x64' || inputs.platform == 'windows-arm64'
      shell: cmd
      run: |
        @echo off
        setlocal EnableExtensions EnableDelayedExpansion

        set "PLATFORM=${{ inputs.platform }}"
        set "REPO=powertech-center/runners/%PLATFORM%"
        set "BASE=https://ghcr.io/v2/%REPO%"
        set "TARGET_DIR=C:\ProgramData\Chocolatey\bin"
        set "WORK=%RUNNER_TEMP%\bootstrap"

        mkdir "%WORK%" 2>nul

        for /f "usebackq delims=" %%T in (`curl -fsSL "https://ghcr.io/token?scope=repository:%REPO%:pull" ^| jq -r .token`) do set "TOKEN=%%T"

        for /f "usebackq delims=" %%D in (`curl -fsSL -H "Authorization: Bearer %TOKEN%" -H "Accept: application/vnd.oci.image.manifest.v1+json" "%BASE%/manifests/latest" ^| jq -r ".layers[0].digest"`) do set "DIGEST=%%D"

        curl -fsSL -H "Authorization: Bearer %TOKEN%" "%BASE%/blobs/%DIGEST%" -o "%WORK%\bin.tar.gz" || exit /b 1
        tar -xzf "%WORK%\bin.tar.gz" --strip-components=1 -C "%TARGET_DIR%" || exit /b 1


    # - uses: actions/setup-go@v6
    #   if: inputs.platform == 'macos-x64' || inputs.platform == 'macos-arm64'
    #   with:
    #     go-version: 'stable'
    #     cache: false

    # - uses: shivammathur/setup-php@v2
    #   if: inputs.platform == 'macos-arm64'
    #   with:
    #     tools: composer

    # -- Checkout (sh) --------------------------------------------------------
    - name: Checkout repository
      if: inputs.checkout == 'true' && !startsWith(inputs.platform, 'windows')
      shell: sh
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        git config --global gc.auto 0
        git config --global advice.detachedHead false
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"
        git init -q
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        if [ "${{ inputs.checkout-lfs }}" = "true" ]; then
          git lfs install --local
        fi

        git fetch --depth=1 origin "${GITHUB_SHA}"
        git checkout FETCH_HEAD

        if [ "${{ inputs.checkout-submodules }}" = "true" ]; then
          git submodule update --init --recursive --depth=1
        fi

    # -- Checkout (cmd) -------------------------------------------------------
    - name: Checkout repository
      if: inputs.checkout == 'true' && startsWith(inputs.platform, 'windows')
      shell: cmd
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        git config --global gc.auto 0
        git config --global advice.detachedHead false
        git config --global --add safe.directory "%GITHUB_WORKSPACE%"
        git init -q
        git remote add origin "https://x-access-token:%GITHUB_TOKEN%@github.com/%GITHUB_REPOSITORY%.git"

        if "${{ inputs.checkout-lfs }}"=="true" (
          git lfs install --local
        )

        git fetch --depth=1 origin "%GITHUB_SHA%"
        git checkout FETCH_HEAD

        if "${{ inputs.checkout-submodules }}"=="true" (
          git submodule update --init --recursive --depth=1
        )

    # -- Download artifacts ---------------------------------------------------
    - name: Download artifacts
      if: inputs.artifacts-download != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-download }}; do
          echo "::group::Download artifact '$NAME'"
          mkdir -p "$ARTIFACTS_DIR/$NAME"
          echo "::notice::Downloaded artifact '$NAME' to $ARTIFACTS_DIR/$NAME"
          echo "::endgroup::"
        done
      # TODO: implement actual download via REST API

    # -- Run command ----------------------------------------------------------
    - name: Run
      if: inputs.command != ''
      shell: ${{ inputs.shell }}
      env:
        RUNNER_PLATFORM: ${{ inputs.platform }}
      run: ${{ inputs.command }}

    # -- Upload artifacts -----------------------------------------------------
    - name: Upload artifacts
      if: inputs.artifacts-upload != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-upload }}; do
          echo "::group::Upload artifact '$NAME'"
          if [ -e "$ARTIFACTS_DIR/$NAME" ]; then
            echo "::notice::Uploaded artifact '$NAME' from $ARTIFACTS_DIR/$NAME"
          else
            echo "::error::Artifact path '$ARTIFACTS_DIR/$NAME' not found"
            exit 1
          fi
          echo "::endgroup::"
        done
      # TODO: implement actual upload via REST API
