name: "Run"
description: "Sets up the runner environment, downloads artifacts, and executes a command"

inputs:
  platform:
    description: "Target platform triplet (e.g., linux-x64-gnu)"
    required: true
  checkout:
    description: "Checkout the calling repository"
    required: false
    default: "true"
  checkout-submodules:
    description: "Checkout submodules recursively"
    required: false
    default: "false"
  checkout-lfs:
    description: "Fetch LFS objects"
    required: false
    default: "false"
  shell:
    description: "Shell to execute the command in (bash, sh, pwsh, cmd)"
    required: false
    default: "bash"
  command:
    description: "Command to execute"
    required: false
    default: ""
  artifacts-dir:
    description: "Directory for artifacts"
    required: false
    default: "artifacts"
  artifacts-download:
    description: "Space-separated list of artifact names to download"
    required: false
    default: ""
  artifacts-upload:
    description: "Space-separated list of artifact names to upload"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # -- Bootstrap (Unix: macOS, Linux) -----------------------------------------
    - name: Bootstrap
      if: "!startsWith(inputs.platform, 'windows')"
      shell: sh
      run: |
        set -e

        PLATFORM="${{ inputs.platform }}"
        REPO="powertech-center/runners/${PLATFORM}"
        BASE="https://ghcr.io/v2/${REPO}"
        WORK="${RUNNER_TEMP}/bootstrap"
        mkdir -p "$WORK"

        TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:${REPO}:pull" | jq -r .token)
        DIGEST=$(curl -fsSL -H "Authorization: Bearer ${TOKEN}" -H "Accept: application/vnd.oci.image.manifest.v1+json" "${BASE}/manifests/latest" | jq -r '.layers[0].digest')
        curl -fsSL -H "Authorization: Bearer ${TOKEN}" "${BASE}/blobs/${DIGEST}" -o "${WORK}/patch.tar.gz"

        # Per-platform prepare: move aside host files that the bundle
        # will replace (or that must disappear for the musl overlay to
        # look native). Underscore prefix mirrors what we do for
        # windows-arm64 LLVM. Non-fatal if a target is absent.
        case "$PLATFORM" in
          linux-x64-musl|linux-arm64-musl)
            ARCH="$(uname -m)"
            case "$ARCH" in
              x86_64)  MULTIARCH="x86_64-linux-gnu" ;;
              aarch64) MULTIARCH="aarch64-linux-gnu" ;;
            esac
            _rename() {
              SRC="$1"; PARENT="$(dirname "$SRC")"; BASE="$(basename "$SRC")"
              [ -e "$SRC" ] || [ -L "$SRC" ] || return 0
              sudo mv "$SRC" "$PARENT/_$BASE"
            }
            _rename "/etc/lsb-release"
            _rename "/usr/include/${MULTIARCH}"
            _rename "/usr/bin/clang"
            _rename "/usr/bin/clang++"
            _rename "/usr/bin/cc"
            _rename "/usr/bin/c++"
            _rename "/usr/bin/ld.lld"
            # The wrappers we install invoke /usr/bin/_clang etc, but
            # Ubuntu ships unversioned /usr/bin/clang as a symlink to
            # /etc/alternatives/clang -> /usr/bin/clang-18. Make sure
            # _clang, _clang++, _ld.lld resolve to the real versioned
            # binary, bypassing the alternatives chain.
            for pair in "clang clang-18" "clang++ clang++-18" "ld.lld ld.lld-18"; do
              set -- $pair
              UNV="$1"; VER="$2"
              if [ ! -e "/usr/bin/_$UNV" ] && [ -x "/usr/bin/$VER" ]; then
                sudo ln -sf "/usr/bin/$VER" "/usr/bin/_$UNV"
              fi
            done
            # Rustup's proxies live at /home/runner/.cargo/bin/ and take
            # priority over /usr/local/bin on the default GitHub runner
            # PATH. Rename them aside so our bundle's rustc/cargo/rustup
            # wrappers (shipped at the same path) get invoked instead --
            # our wrappers then call back into the real rustup proxies
            # via the underscore-prefixed names.
            # Rustup proxies dispatch by basename of current_exe() (not
            # argv[0]), so we cannot just `exec -a rustc _rustc` -- the
            # proxy binary must physically live at a path whose basename
            # is `rustc` / `cargo` / `rustup`. Copy the originals to a
            # separate directory so our wrappers (shipped at the default
            # ~/.cargo/bin paths) can delegate into real, correctly-named
            # proxy binaries.
            REAL_DIR="/home/runner/.cargo/bin/_rustup-real"
            sudo mkdir -p "$REAL_DIR"
            for tool in rustc cargo rustup; do
              SRC="/home/runner/.cargo/bin/$tool"
              if [ -e "$SRC" ] && [ ! -e "$REAL_DIR/$tool" ]; then
                sudo cp -a "$SRC" "$REAL_DIR/$tool"
              fi
            done
            ;;
        esac

        # Extract bundle at filesystem root. Do NOT swallow stderr -- a
        # failure here must stop the bootstrap loudly instead of leaking
        # into later steps as confusing "command not found" / linker
        # errors. This mirrors the gating Emulate step in
        # bootstrap-build-publish.yml so that both paths fail fast.
        if [ "$(uname -s)" = "Darwin" ]; then
          sudo tar -xmozf "${WORK}/patch.tar.gz" -C /
        else
          sudo tar --no-overwrite-dir -xzf "${WORK}/patch.tar.gz" -C /
        fi

        # macOS: Go is pre-installed in hostedtoolcache but not on PATH.
        # Activate the latest version. Linux and Windows already have Go
        # in PATH out of the box, so no activation needed there.
        if [ "$(uname -s)" = "Darwin" ]; then
          ARCH=$([ "$(uname -m)" = "arm64" ] && echo "arm64" || echo "x64")
          TOOLCACHE="${AGENT_TOOLSDIRECTORY:-/Users/runner/hostedtoolcache}"
          GO_DIR="$TOOLCACHE/go"
          if [ -d "$GO_DIR" ]; then
            GO_VERSION=$(ls -1 "$GO_DIR" | sort -V | tail -1)
            if [ -n "$GO_VERSION" ] && [ -f "$GO_DIR/$GO_VERSION/${ARCH}.complete" ]; then
              GOROOT="$GO_DIR/$GO_VERSION/$ARCH"
              echo "GOROOT=$GOROOT" >> "$GITHUB_ENV"
              echo "$GOROOT/bin" >> "$GITHUB_PATH"
              echo "Go activated: $("$GOROOT/bin/go" version)"
            fi
          fi
        fi

    # -- Bootstrap (Windows) --------------------------------------------------
    - name: Bootstrap
      if: startsWith(inputs.platform, 'windows')
      shell: cmd
      run: |
        @echo off
        setlocal EnableExtensions EnableDelayedExpansion

        set "PLATFORM=${{ inputs.platform }}"
        set "REPO=powertech-center/runners/%PLATFORM%"
        set "BASE=https://ghcr.io/v2/%REPO%"
        set "WORK=%RUNNER_TEMP%\bootstrap"
        mkdir "%WORK%" 2>nul

        for /f "usebackq delims=" %%T in (`curl -fsSL "https://ghcr.io/token?scope=repository:%REPO%:pull" ^| jq -r .token`) do set "TOKEN=%%T"
        for /f "usebackq delims=" %%D in (`curl -fsSL -H "Authorization: Bearer %TOKEN%" -H "Accept: application/vnd.oci.image.manifest.v1+json" "%BASE%/manifests/latest" ^| jq -r ".layers[0].digest"`) do set "DIGEST=%%D"
        curl -fsSL -H "Authorization: Bearer %TOKEN%" "%BASE%/blobs/%DIGEST%" -o "%WORK%\patch.tar.gz" || exit /b 1
        rem windows-arm64 bundle replaces stock MSVC-targeting LLVM with
        rem llvm-mingw. Rename the original out of the way so our files
        rem land cleanly at C:\Program Files\LLVM.
        if "%PLATFORM%"=="windows-arm64" (
          if exist "C:\Program Files\LLVM" (
            ren "C:\Program Files\LLVM" _LLVM
          )
        )
        rem Extract bundle at C:\. Mirrors the gating Emulate step in
        rem bootstrap-build-publish.yml -- fail fast on tar errors.
        tar -xzf "%WORK%\patch.tar.gz" -C C:\ || exit /b 1

    # -- Checkout (sh) --------------------------------------------------------
    - name: Checkout repository
      if: inputs.checkout == 'true' && !startsWith(inputs.platform, 'windows')
      shell: sh
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        git config --global gc.auto 0
        git config --global advice.detachedHead false
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"
        git init -q
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        if [ "${{ inputs.checkout-lfs }}" = "true" ]; then
          git lfs install --local
        fi

        git fetch --depth=1 origin "${GITHUB_SHA}"
        git checkout FETCH_HEAD

        if [ "${{ inputs.checkout-submodules }}" = "true" ]; then
          git submodule update --init --recursive --depth=1
        fi

    # -- Checkout (cmd) -------------------------------------------------------
    - name: Checkout repository
      if: inputs.checkout == 'true' && startsWith(inputs.platform, 'windows')
      shell: cmd
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        git config --global gc.auto 0
        git config --global advice.detachedHead false
        git config --global --add safe.directory "%GITHUB_WORKSPACE%"
        git init -q
        git remote add origin "https://x-access-token:%GITHUB_TOKEN%@github.com/%GITHUB_REPOSITORY%.git"

        if "${{ inputs.checkout-lfs }}"=="true" (
          git lfs install --local
        )

        git fetch --depth=1 origin "%GITHUB_SHA%"
        git checkout FETCH_HEAD

        if "${{ inputs.checkout-submodules }}"=="true" (
          git submodule update --init --recursive --depth=1
        )

    # -- Download artifacts ---------------------------------------------------
    - name: Download artifacts
      if: inputs.artifacts-download != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-download }}; do
          echo "::group::Download artifact '$NAME'"
          mkdir -p "$ARTIFACTS_DIR/$NAME"
          echo "::notice::Downloaded artifact '$NAME' to $ARTIFACTS_DIR/$NAME"
          echo "::endgroup::"
        done
      # TODO: implement actual download via REST API

    # -- Run command ----------------------------------------------------------
    - name: Run
      if: inputs.command != ''
      shell: ${{ inputs.shell }}
      env:
        RUNNER_PLATFORM: ${{ inputs.platform }}
      run: ${{ inputs.command }}

    # -- Upload artifacts -----------------------------------------------------
    - name: Upload artifacts
      if: inputs.artifacts-upload != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-upload }}; do
          echo "::group::Upload artifact '$NAME'"
          if [ -e "$ARTIFACTS_DIR/$NAME" ]; then
            echo "::notice::Uploaded artifact '$NAME' from $ARTIFACTS_DIR/$NAME"
          else
            echo "::error::Artifact path '$ARTIFACTS_DIR/$NAME' not found"
            exit 1
          fi
          echo "::endgroup::"
        done
      # TODO: implement actual upload via REST API
