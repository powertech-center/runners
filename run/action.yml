name: "Run"
description: "Sets up the runner environment, installs tools, downloads artifacts, and executes a command"

inputs:
  platform:
    description: "Target platform triplet (e.g., linux-x64-gnu)"
    required: true
  command:
    description: "Command to execute"
    required: true
  shell:
    description: "Shell to use (bash or pwsh)"
    required: false
    default: "bash"
  tools:
    description: "Space-separated list of tools to install"
    required: false
    default: ""
  checkout:
    description: "Checkout the calling repository"
    required: false
    default: "true"
  artifact-name-prefix:
    description: "Base artifact name. Full name: {prefix}-{platform}"
    required: false
    default: ""
  artifact-path:
    description: "Path to download artifacts to"
    required: false
    default: "./artifacts"

runs:
  using: "composite"
  steps:
    # ── Bootstrap ─────────────────────────────────────────────────────
    - name: Bootstrap
      if: contains(inputs.platform, 'musl')
      shell: sh
      run: apk add --no-cache bash git curl wget zip unzip make ninja pkgconf

    - name: Bootstrap
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install wget make zip unzip pkgconfiglite -y --no-progress

    # ── Checkout ───────────────────────────────────────────────────────
    - name: Checkout repository
      if: inputs.checkout == 'true'
      uses: actions/checkout@v4

    # ── Setup runner environment ───────────────────────────────────────
    - name: Setup runner
      id: parse
      shell: bash
      run: |
        PLATFORM="${{ inputs.platform }}"

        case "$PLATFORM" in
          linux-x64-gnu|linux-x64-musl|linux-arm64-gnu|linux-arm64-musl|\
          windows-x64|windows-arm64|macos-x64|macos-arm64)
            ;;
          *)
            echo "::error::Unknown platform: $PLATFORM"
            exit 1
            ;;
        esac

        IFS='-' read -r OS ARCH LIBC <<< "$PLATFORM"

        echo "PT_OS=$OS" >> "$GITHUB_ENV"
        echo "PT_ARCH=$ARCH" >> "$GITHUB_ENV"
        echo "PT_LIBC=$LIBC" >> "$GITHUB_ENV"
        echo "PT_PLATFORM=$PLATFORM" >> "$GITHUB_ENV"

        echo "os=$OS" >> "$GITHUB_OUTPUT"
        echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
        echo "libc=$LIBC" >> "$GITHUB_OUTPUT"

        echo "::notice::Platform: $PLATFORM (os=$OS, arch=$ARCH, libc=${LIBC:-none})"

    - name: Detect emulation
      shell: bash
      run: |
        EXPECTED_ARCH="${{ steps.parse.outputs.arch }}"
        EMULATED="false"

        if [ "${{ runner.os }}" = "Windows" ]; then
          ACTUAL_ARCH=$(powershell -Command "[System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture")
          case "$ACTUAL_ARCH" in
            X64) ACTUAL_ARCH="x64" ;;
            Arm64) ACTUAL_ARCH="arm64" ;;
          esac
        else
          MACHINE=$(uname -m)
          case "$MACHINE" in
            x86_64|amd64) ACTUAL_ARCH="x64" ;;
            aarch64|arm64) ACTUAL_ARCH="arm64" ;;
            *) ACTUAL_ARCH="$MACHINE" ;;
          esac
        fi

        if [ "$ACTUAL_ARCH" != "$EXPECTED_ARCH" ]; then
          EMULATED="true"
          echo "::warning::Running under emulation: expected $EXPECTED_ARCH, detected $ACTUAL_ARCH"
        fi

        echo "PT_EMULATED=$EMULATED" >> "$GITHUB_ENV"

    # ── Setup tools ────────────────────────────────────────────────────

    - name: Install GCC
      if: contains(inputs.tools, 'gcc')
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache build-base
            else
              sudo apt-get update -qq && sudo apt-get install -y -qq build-essential
            fi ;;
          macOS)   brew install gcc ;;
          Windows) choco install mingw -y --no-progress ;;
        esac

    - name: Install Clang
      if: contains(inputs.tools, 'clang')
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache clang compiler-rt
            else
              sudo apt-get update -qq && sudo apt-get install -y -qq clang
            fi ;;
          macOS)   ;; # Apple Clang is pre-installed
          Windows) choco install llvm -y --no-progress ;;
        esac

    - name: Install CMake
      if: contains(inputs.tools, 'cmake')
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache cmake
            else
              sudo apt-get update -qq && sudo apt-get install -y -qq cmake
            fi ;;
          macOS)   brew install cmake ;;
          Windows) choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y --no-progress ;;
        esac

    - name: Install Meson
      if: contains(inputs.tools, 'meson')
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache meson
            else
              pip3 install --user meson
            fi ;;
          macOS)   brew install meson ;;
          Windows) pip install meson ;;
        esac

    - name: Install Python
      if: contains(inputs.tools, 'python') && !contains(inputs.platform, 'musl')
      uses: actions/setup-python@v5

    - name: Install Python
      if: contains(inputs.tools, 'python') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache python3 py3-pip

    - name: Install Go
      if: contains(inputs.tools, 'go') && !contains(inputs.platform, 'musl')
      uses: actions/setup-go@v5
      with:
        go-version: stable

    - name: Install Go
      if: contains(inputs.tools, 'go') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache go

    - name: Install Rust
      if: contains(inputs.tools, 'rust') && !contains(inputs.platform, 'musl')
      uses: dtolnay/rust-toolchain@stable

    - name: Install Rust
      if: contains(inputs.tools, 'rust') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache rust cargo

    - name: Install .NET
      if: contains(inputs.tools, 'dotnet') && !contains(inputs.platform, 'musl')
      uses: actions/setup-dotnet@v4

    - name: Install .NET
      if: contains(inputs.tools, 'dotnet') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache dotnet8-sdk

    - name: Install Node.js
      if: contains(inputs.tools, 'node') && !contains(inputs.platform, 'musl')
      uses: actions/setup-node@v4

    - name: Install Node.js
      if: contains(inputs.tools, 'node') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache nodejs npm

    - name: Install Java
      if: contains(inputs.tools, 'java') && !contains(inputs.platform, 'musl')
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21

    - name: Install Java
      if: contains(inputs.tools, 'java') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache openjdk21

    - name: Install Gradle
      if: contains(inputs.tools, 'gradle') && !contains(inputs.platform, 'musl')
      uses: gradle/actions/setup-gradle@v4

    - name: Install Gradle
      if: contains(inputs.tools, 'gradle') && contains(inputs.platform, 'musl')
      shell: bash
      run: apk add --no-cache gradle

    - name: Install Flutter
      if: contains(inputs.tools, 'flutter') && !contains(inputs.platform, 'musl')
      uses: subosito/flutter-action@v2

    - name: Install Flutter
      if: contains(inputs.tools, 'flutter') && contains(inputs.platform, 'musl')
      shell: bash
      run: |
        echo "::warning::Flutter is not officially supported on Alpine/musl"
        apk add --no-cache dart

    - name: Install Crossler
      if: contains(inputs.tools, 'crossler')
      shell: bash
      run: curl -fsSL https://raw.githubusercontent.com/powertech-center/crossler/master/scripts/install.sh | sh

    - name: Install PowerShell
      if: contains(inputs.tools, 'pwsh')
      shell: bash
      run: |
        case "${{ runner.os }}" in
          Linux)
            if [ -f /etc/alpine-release ]; then
              apk add --no-cache ca-certificates krb5-libs libgcc libintl libssl3 libstdc++ icu-libs
              curl -fsSL "https://github.com/PowerShell/PowerShell/releases/download/v7.6.0/powershell-7.6.0-linux-musl-${{ steps.parse.outputs.arch }}.tar.gz" -o /tmp/pwsh.tar.gz
              mkdir -p /opt/microsoft/powershell/7
              tar xzf /tmp/pwsh.tar.gz -C /opt/microsoft/powershell/7
              chmod +x /opt/microsoft/powershell/7/pwsh
              ln -sf /opt/microsoft/powershell/7/pwsh /usr/local/bin/pwsh
              rm /tmp/pwsh.tar.gz
            else
              wget -q "https://packages.microsoft.com/config/ubuntu/24.04/packages-microsoft-prod.deb" -O /tmp/ms-prod.deb
              sudo dpkg -i /tmp/ms-prod.deb && rm /tmp/ms-prod.deb
              sudo apt-get update -qq && sudo apt-get install -y -qq powershell
            fi ;;
          macOS)   brew install powershell/tap/powershell ;;
          Windows) ;; # PowerShell is pre-installed
        esac

    # Validate installed tools
    - name: Validate installed tools
      if: inputs.tools != ''
      shell: bash
      run: |
        echo "::group::Installed tool versions"
        for tool in ${{ inputs.tools }}; do
          case "$tool" in
            gcc)        gcc --version 2>/dev/null | head -1 || echo "gcc: not found" ;;
            clang)      clang --version 2>/dev/null | head -1 || echo "clang: not found" ;;
            cmake)      cmake --version 2>/dev/null | head -1 || echo "cmake: not found" ;;
            meson)      meson --version 2>/dev/null || echo "meson: not found" ;;
            python)     python3 --version 2>/dev/null || python --version 2>/dev/null || echo "python: not found" ;;
            go)         go version 2>/dev/null || echo "go: not found" ;;
            rust)       rustc --version 2>/dev/null || echo "rustc: not found" ;;
            dotnet)     dotnet --version 2>/dev/null || echo "dotnet: not found" ;;
            node)       node --version 2>/dev/null || echo "node: not found" ;;
            java)       java --version 2>/dev/null | head -1 || echo "java: not found" ;;
            gradle)     gradle --version 2>/dev/null | head -3 | tail -1 || echo "gradle: not found" ;;
            flutter)    flutter --version 2>/dev/null | head -1 || echo "flutter: not found" ;;
            crossler)   crossler --version 2>/dev/null || echo "crossler: not found" ;;
            pwsh)       pwsh --version 2>/dev/null || echo "pwsh: not found" ;;
            *)          echo "Unknown tool: $tool" ;;
          esac
        done
        echo "::endgroup::"

    # ── Download artifact ──────────────────────────────────────────────
    - name: Download artifact
      if: inputs.artifact-name-prefix != ''
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-name-prefix }}-${{ inputs.platform }}
        path: ${{ inputs.artifact-path }}

    # ── Run command ────────────────────────────────────────────────────
    - name: Run
      shell: ${{ inputs.shell }}
      run: ${{ inputs.command }}
