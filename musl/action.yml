name: "Run"
description: "Sets up the musl/Alpine runner environment, downloads artifacts, and executes a command"

inputs:
  platform:
    description: "Target platform triplet (linux-x64-musl or linux-arm64-musl)"
    required: true
  checkout:
    description: "Checkout the calling repository"
    required: false
    default: "true"
  shell:
    description: "Shell to use (bash or pwsh)"
    required: false
    default: "bash"
  command:
    description: "Command to execute"
    required: false
    default: ""
  artifacts-dir:
    description: "Directory for artifacts"
    required: false
    default: "artifacts"
  artifacts-download:
    description: "Space-separated list of artifact names to download"
    required: false
    default: ""
  artifacts-upload:
    description: "Space-separated list of artifact names to upload"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # -- Checkout -------------------------------------------------------------
    # Shell-based checkout to avoid JS actions that fail in Alpine containers
    # on arm64 runners (GitHub Runner does not support JS actions in Alpine on arm64).
    - name: Checkout repository
      if: inputs.checkout == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        git config --global init.defaultBranch main
        git config --global --add safe.directory "${GITHUB_WORKSPACE}"
        git init
        git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        git fetch --depth=1 origin "${GITHUB_SHA}"
        git checkout FETCH_HEAD

    # -- Setup runner environment ---------------------------------------------
    # - name: Setup runner environment
    #   id: parse
    #   shell: bash
    #   run: |
    #     PLATFORM="${{ inputs.platform }}"
    #
    #     case "$PLATFORM" in
    #       linux-x64-musl|linux-arm64-musl)
    #         ;;
    #       *)
    #         echo "::error::Unknown musl platform: $PLATFORM"
    #         exit 1
    #         ;;
    #     esac
    #
    #     IFS='-' read -r OS ARCH LIBC <<< "$PLATFORM"
    #
    #     echo "PT_OS=$OS" >> "$GITHUB_ENV"
    #     echo "PT_ARCH=$ARCH" >> "$GITHUB_ENV"
    #     echo "PT_LIBC=$LIBC" >> "$GITHUB_ENV"
    #     echo "PT_PLATFORM=$PLATFORM" >> "$GITHUB_ENV"
    #
    #     echo "os=$OS" >> "$GITHUB_OUTPUT"
    #     echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
    #     echo "libc=$LIBC" >> "$GITHUB_OUTPUT"
    #
    #     echo "::notice::Platform: $PLATFORM (os=$OS, arch=$ARCH, libc=$LIBC)"

    # -- Download artifacts ---------------------------------------------------
    - name: Download artifacts
      if: inputs.artifacts-download != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        RUN_ID="${GITHUB_RUN_ID}"
        REPO="${GITHUB_REPOSITORY}"

        for NAME in ${{ inputs.artifacts-download }}; do
          echo "::group::Download artifact '$NAME'"
          mkdir -p "$ARTIFACTS_DIR/$NAME"

          ARTIFACT_ID=$(curl -fsSL \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${REPO}/actions/runs/${RUN_ID}/artifacts" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for a in data.get('artifacts', []):
              if a['name'] == '$NAME':
                  print(a['id'])
                  break
          ")

          if [ -z "$ARTIFACT_ID" ]; then
            echo "::error::Artifact '$NAME' not found"
            exit 1
          fi

          curl -fsSL \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -o /tmp/artifact.zip \
            "https://api.github.com/repos/${REPO}/actions/artifacts/${ARTIFACT_ID}/zip"

          unzip -o /tmp/artifact.zip -d "$ARTIFACTS_DIR/$NAME"
          rm /tmp/artifact.zip
          echo "::notice::Downloaded artifact '$NAME' to $ARTIFACTS_DIR/$NAME"
          echo "::endgroup::"
        done

    # -- Run command ----------------------------------------------------------
    - name: Run
      if: inputs.command != ''
      shell: ${{ inputs.shell }}
      env:
        RUNNER_PLATFORM: ${{ inputs.platform }}
      run: ${{ inputs.command }}

    # -- Upload artifacts -----------------------------------------------------
    - name: Upload artifacts
      if: inputs.artifacts-upload != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-upload }}; do
          echo "::group::Upload artifact '$NAME'"
          if [ -e "$ARTIFACTS_DIR/$NAME" ]; then
            echo "::notice::Uploaded artifact '$NAME' from $ARTIFACTS_DIR/$NAME"
          else
            echo "::error::Artifact path '$ARTIFACTS_DIR/$NAME' not found"
            exit 1
          fi
          echo "::endgroup::"
        done
      # TODO: implement actual upload via REST API
