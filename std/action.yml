name: "Run"
description: "Sets up the runner environment, downloads artifacts, and executes a command"

inputs:
  platform:
    description: "Target platform triplet (e.g., linux-x64-gnu)"
    required: true
  shell:
    description: "Shell to use (bash or pwsh)"
    required: false
    default: "bash"
  checkout:
    description: "Checkout the calling repository"
    required: false
    default: "true"
  command:
    description: "Command to execute"
    required: true
  artifacts-dir:
    description: "Directory for artifacts"
    required: false
    default: "artifacts"
  artifacts-download:
    description: "Space-separated list of artifact names to download"
    required: false
    default: ""
  artifacts-upload:
    description: "Space-separated list of artifact names to upload"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # -- Bootstrap ------------------------------------------------------------
    - name: Bootstrap
      if: inputs.platform == 'linux-x64-gnu' || inputs.platform == 'linux-arm64-gnu'
      shell: bash
      run: npm install -g pnpm

    - name: Bootstrap
      if: inputs.platform == 'macos-x64'
      shell: bash
      run: |
        brew install tree go pnpm

    - name: Bootstrap
      if: inputs.platform == 'macos-arm64'
      shell: bash
      run: |
        brew install tree go php composer pnpm

    - name: Bootstrap
      if: inputs.platform == 'windows-x64'
      shell: pwsh
      run: |
        choco install wget zip yq tree -y --no-progress
        npm install -g pnpm

    - name: Bootstrap
      if: inputs.platform == 'windows-arm64'
      shell: pwsh
      run: |
        choco install wget zip yq zstd tree -y --no-progress
        npm install -g pnpm

    # -- Checkout -------------------------------------------------------------
    - name: Checkout repository
      if: inputs.checkout == 'true'
      uses: actions/checkout@v5

    # -- Setup runner environment ---------------------------------------------
    - name: Setup runner environment
      id: parse
      shell: bash
      run: |
        PLATFORM="${{ inputs.platform }}"

        case "$PLATFORM" in
          linux-x64-gnu|linux-arm64-gnu|\
          windows-x64|windows-arm64|macos-x64|macos-arm64)
            ;;
          *)
            echo "::error::Unknown platform: $PLATFORM"
            exit 1
            ;;
        esac

        IFS='-' read -r OS ARCH LIBC <<< "$PLATFORM"

        echo "PT_OS=$OS" >> "$GITHUB_ENV"
        echo "PT_ARCH=$ARCH" >> "$GITHUB_ENV"
        echo "PT_LIBC=$LIBC" >> "$GITHUB_ENV"
        echo "PT_PLATFORM=$PLATFORM" >> "$GITHUB_ENV"

        echo "os=$OS" >> "$GITHUB_OUTPUT"
        echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
        echo "libc=$LIBC" >> "$GITHUB_OUTPUT"

        echo "::notice::Platform: $PLATFORM (os=$OS, arch=$ARCH, libc=${LIBC:-none})"

    # -- Download artifacts ---------------------------------------------------
    - name: Download artifacts
      if: inputs.artifacts-download != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-download }}; do
          echo "::group::Download artifact '$NAME'"
          mkdir -p "$ARTIFACTS_DIR/$NAME"
          echo "::notice::Downloaded artifact '$NAME' to $ARTIFACTS_DIR/$NAME"
          echo "::endgroup::"
        done
      # TODO: implement actual download via REST API

    # -- Run command ----------------------------------------------------------
    - name: Run
      shell: ${{ inputs.shell }}
      run: ${{ inputs.command }}

    # -- Upload artifacts -----------------------------------------------------
    - name: Upload artifacts
      if: inputs.artifacts-upload != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-upload }}; do
          echo "::group::Upload artifact '$NAME'"
          if [ -e "$ARTIFACTS_DIR/$NAME" ]; then
            echo "::notice::Uploaded artifact '$NAME' from $ARTIFACTS_DIR/$NAME"
          else
            echo "::error::Artifact path '$ARTIFACTS_DIR/$NAME' not found"
            exit 1
          fi
          echo "::endgroup::"
        done
      # TODO: implement actual upload via REST API
