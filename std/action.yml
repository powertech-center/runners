name: "Run"
description: "Sets up the runner environment, downloads artifacts, and executes a command"

inputs:
  platform:
    description: "Target platform triplet (e.g., linux-x64-gnu)"
    required: true
  shell:
    description: "Shell to use (bash or pwsh)"
    required: false
    default: "bash"
  checkout:
    description: "Checkout the calling repository"
    required: false
    default: "true"
  command:
    description: "Command to execute"
    required: true
  artifacts-dir:
    description: "Directory for artifacts"
    required: false
    default: "artifacts"
  artifacts-download:
    description: "Space-separated list of artifact names to download"
    required: false
    default: ""
  artifacts-upload:
    description: "Space-separated list of artifact names to upload"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # -- Bootstrap ------------------------------------------------------------
    - name: Bootstrap
      if: runner.os == 'Windows'
      shell: pwsh
      run: choco install wget zip -y --no-progress

    # -- Checkout -------------------------------------------------------------
    - name: Checkout repository
      if: inputs.checkout == 'true'
      uses: actions/checkout@v5

    # -- Setup runner environment ---------------------------------------------
    - name: Setup runner
      id: parse
      shell: bash
      run: |
        PLATFORM="${{ inputs.platform }}"

        case "$PLATFORM" in
          linux-x64-gnu|linux-arm64-gnu|\
          windows-x64|windows-arm64|macos-x64|macos-arm64)
            ;;
          *)
            echo "::error::Unknown platform: $PLATFORM"
            exit 1
            ;;
        esac

        IFS='-' read -r OS ARCH LIBC <<< "$PLATFORM"

        echo "PT_OS=$OS" >> "$GITHUB_ENV"
        echo "PT_ARCH=$ARCH" >> "$GITHUB_ENV"
        echo "PT_LIBC=$LIBC" >> "$GITHUB_ENV"
        echo "PT_PLATFORM=$PLATFORM" >> "$GITHUB_ENV"

        echo "os=$OS" >> "$GITHUB_OUTPUT"
        echo "arch=$ARCH" >> "$GITHUB_OUTPUT"
        echo "libc=$LIBC" >> "$GITHUB_OUTPUT"

        echo "::notice::Platform: $PLATFORM (os=$OS, arch=$ARCH, libc=${LIBC:-none})"

    - name: Detect emulation
      if: runner.os != 'Windows'
      shell: bash
      run: |
        EXPECTED_ARCH="${{ steps.parse.outputs.arch }}"
        EMULATED="false"

        MACHINE=$(uname -m)
        case "$MACHINE" in
          x86_64|amd64) ACTUAL_ARCH="x64" ;;
          aarch64|arm64) ACTUAL_ARCH="arm64" ;;
          *) ACTUAL_ARCH="$MACHINE" ;;
        esac

        if [ "$ACTUAL_ARCH" != "$EXPECTED_ARCH" ]; then
          EMULATED="true"
          echo "::warning::Running under emulation: expected $EXPECTED_ARCH, detected $ACTUAL_ARCH"
        fi

        echo "PT_EMULATED=$EMULATED" >> "$GITHUB_ENV"

    - name: Detect emulation
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $expectedArch = '${{ steps.parse.outputs.arch }}'
        $osArch = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture.ToString()

        switch ($osArch) {
          'X64'   { $actualArch = 'x64' }
          'Arm64' { $actualArch = 'arm64' }
          default { $actualArch = $osArch.ToLowerInvariant() }
        }

        $emulated = 'false'
        if ($actualArch -ne $expectedArch) {
          $emulated = 'true'
          Write-Host "::warning::Running under emulation: expected $expectedArch, detected $actualArch"
        }

        "PT_EMULATED=$emulated" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    # -- Download artifacts ---------------------------------------------------
    - name: Download artifacts
      if: inputs.artifacts-download != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-download }}; do
          echo "::group::Download artifact '$NAME'"
          mkdir -p "$ARTIFACTS_DIR/$NAME"
          echo "::notice::Downloaded artifact '$NAME' to $ARTIFACTS_DIR/$NAME"
          echo "::endgroup::"
        done
      # TODO: implement actual download via REST API

    # -- Run command ----------------------------------------------------------
    - name: Run
      shell: ${{ inputs.shell }}
      run: ${{ inputs.command }}

    # -- Upload artifacts -----------------------------------------------------
    - name: Upload artifacts
      if: inputs.artifacts-upload != ''
      shell: bash
      run: |
        ARTIFACTS_DIR="${{ inputs.artifacts-dir }}"
        for NAME in ${{ inputs.artifacts-upload }}; do
          echo "::group::Upload artifact '$NAME'"
          if [ -e "$ARTIFACTS_DIR/$NAME" ]; then
            echo "::notice::Uploaded artifact '$NAME' from $ARTIFACTS_DIR/$NAME"
          else
            echo "::error::Artifact path '$ARTIFACTS_DIR/$NAME' not found"
            exit 1
          fi
          echo "::endgroup::"
        done
      # TODO: implement actual upload via REST API
